<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hallmark · watercolor sprinkle · contact sheet</title>
<style>
  :root { --paper: oklch(95% 0.018 75); --ink: oklch(20% 0.020 60); --rule: oklch(78% 0.020 60); --accent: oklch(48% 0.140 40); }
  * { box-sizing: border-box; }
  body { font-family: "Fraunces", Georgia, serif; background: var(--paper); color: var(--ink); margin: 0; padding: 3rem 2rem; line-height: 1.55; }
  h1 { font-style: italic; font-size: 2rem; margin: 0 0 0.5rem; }
  .meta { color: oklch(45% 0.020 55); font-size: 0.875rem; margin: 0 0 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2rem; max-width: 96rem; margin: 0 auto; }
  figure { margin: 0; display: grid; gap: 0.5rem; }
  figure img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; background: oklch(92% 0.015 75); border: 0.5px solid var(--rule); }
  figure[data-square] img { aspect-ratio: 1 / 1; }
  figcaption { font-size: 0.875rem; }
  .id { font-family: "JetBrains Mono", monospace; color: var(--accent); font-size: 0.75rem; letter-spacing: 0.04em; }
  .role { color: oklch(45% 0.020 55); margin-top: 0.2em; }
</style>
</head>
<body>

<h1>Hallmark · watercolor sprinkle · 18 plates</h1>
<p class="meta">Seed 7727 · model google/gemini-3-pro-image · all share the locked reference (_seed-reference.png) · cost ≈ $2.41</p>

<div class="grid">

  <figure>
    <img src="_seed-reference.png" alt="">
    <figcaption><span class="id">_seed-reference</span><br>locked style anchor (passed as reference_images[0] on every other call)</figcaption>
  </figure>

  <figure>
    <img src="hero-bg.png" alt="">
    <figcaption><span class="id">hero-bg</span><br><span class="role">§01 Hero · ambient backdrop · the rulebook itself</span></figcaption>
  </figure>

  <figure>
    <img src="transition-02-03.png" alt="">
    <figcaption><span class="id">transition-02-03</span><br><span class="role">between Examples → Study · eight folded papers</span></figcaption>
  </figure>

  <figure>
    <img src="study-bg.png" alt="">
    <figcaption><span class="id">study-bg</span><br><span class="role">§03 Study · diagnostic overlay on a printed page</span></figcaption>
  </figure>

  <figure>
    <img src="transition-04-05.png" alt="">
    <figcaption><span class="id">transition-04-05</span><br><span class="role">between Without/With → Foundations · draft vs final</span></figcaption>
  </figure>

  <figure data-square>
    <img src="found-type.png" alt="">
    <figcaption><span class="id">found-type</span><br><span class="role">§05 Type · serif G with construction grid</span></figcaption>
  </figure>

  <figure data-square>
    <img src="found-colour.png" alt="">
    <figcaption><span class="id">found-colour</span><br><span class="role">§05 Colour · single coral wash at 3% footprint</span></figcaption>
  </figure>

  <figure data-square>
    <img src="found-space.png" alt="">
    <figcaption><span class="id">found-space</span><br><span class="role">§05 Space · architect's freehand floor plan</span></figcaption>
  </figure>

  <figure data-square>
    <img src="found-motion.png" alt="">
    <figcaption><span class="id">found-motion</span><br><span class="role">§05 Motion · Muybridge brushstroke strip</span></figcaption>
  </figure>

  <figure data-square>
    <img src="found-voice.png" alt="">
    <figcaption><span class="id">found-voice</span><br><span class="role">§05 Voice · marginalia, three honest words</span></figcaption>
  </figure>

  <figure data-square>
    <img src="harness-claude.png" alt="">
    <figcaption><span class="id">harness-claude</span><br><span class="role">§07 Install · Claude Code = sealed letter</span></figcaption>
  </figure>

  <figure data-square>
    <img src="harness-cursor.png" alt="">
    <figcaption><span class="id">harness-cursor</span><br><span class="role">§07 Install · Cursor = brass drafting compass</span></figcaption>
  </figure>

  <figure data-square>
    <img src="harness-codex.png" alt="">
    <figcaption><span class="id">harness-codex</span><br><span class="role">§07 Install · Codex = a literal medieval codex</span></figcaption>
  </figure>

  <figure data-square>
    <img src="footer-mark.png" alt="">
    <figcaption><span class="id">footer-mark</span><br><span class="role">footer · wax-seal colophon mark</span></figcaption>
  </figure>

  <figure>
    <img src="plate-podcast.png" alt="">
    <figcaption><span class="id">plate-podcast</span><br><span class="role">examples plate · indie podcast (Tide)</span></figcaption>
  </figure>

  <figure>
    <img src="plate-bakery.png" alt="">
    <figcaption><span class="id">plate-bakery</span><br><span class="role">examples plate · bakery (Maple)</span></figcaption>
  </figure>

  <figure>
    <img src="plate-architecture.png" alt="">
    <figcaption><span class="id">plate-architecture</span><br><span class="role">examples plate · architecture studio</span></figcaption>
  </figure>

  <figure>
    <img src="plate-manifesto.png" alt="">
    <figcaption><span class="id">plate-manifesto</span><br><span class="role">examples plate · manifesto</span></figcaption>
  </figure>

</div>

</body>
</html>
